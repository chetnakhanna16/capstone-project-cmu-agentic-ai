name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout capstone repo
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PMD
        run: |
          PMD_VERSION="7.7.0"
          wget -q "https://github.com/pmd/pmd/releases/download/pmd_releases/${PMD_VERSION}/pmd-dist-${PMD_VERSION}-bin.zip"
          unzip -q "pmd-dist-${PMD_VERSION}-bin.zip"
          echo "${GITHUB_WORKSPACE}/pmd-bin-${PMD_VERSION}/bin" >> $GITHUB_PATH

      - name: Clone Jenkins codebase (shallow)
        run: git clone --depth=1 https://github.com/chetnakhanna16/jenkins jenkins

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run smoke test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python smoke_test.py
